name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Zig ${{ matrix.zig }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        zig:
          - 0.16.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}

      - name: Check Formatting
        run: zig fmt --check .

      - name: Run Tests
        run: zig build test

      - name: Build Debug
        run: zig build

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Check Release Artifact
        run: test -x zig-out/bin/dockpit

      - name: Smoke Print Tasks
        run: zig build run -- --print-tasks

      - name: Smoke Print Tasks JSON
        run: |
          zig build run -- --project-dir tests/fixtures/workspace_project --print-tasks --json | grep '"pnpm-dockpit-app-dev"'

      - name: Smoke Fixture Detection
        run: zig build run -- --project-dir tests/fixtures/pnpm_project --print-tasks

      - name: Smoke History JSON
        run: zig build run -- --project-dir tests/fixtures/config_project --history --json

      - name: Smoke No Git Project
        run: |
          tmpdir="$(mktemp -d)"
          zig build run -- --project-dir "$tmpdir" --no-git --print-tasks

      - name: Smoke Broken Config Fallback
        run: zig build run -- --project-dir tests/fixtures/config_project --config broken.json --print-tasks

      - name: Smoke Strict Config Failure
        run: |
          if zig build run -- --project-dir tests/fixtures/config_project --config broken.json --strict-config --print-tasks; then
            echo "strict config unexpectedly succeeded"
            exit 1
          fi

      - name: Smoke Config Validation Failure
        run: |
          if zig build run -- --project-dir tests/fixtures/config_project --config duplicate_task.json --strict-config --print-tasks; then
            echo "duplicate task config unexpectedly succeeded"
            exit 1
          fi

      - name: Smoke Help
        run: zig build run -- --help

      - name: Smoke Version
        run: zig build run -- --version

      - name: Smoke Run Task
        run: zig build run -- --run zig-build

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Zig ${{ matrix.zig }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        zig:
          - 0.16.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}

      - name: Check Formatting
        run: zig fmt --check .

      - name: Run Tests
        run: zig build test

      - name: Build Debug
        run: zig build

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Smoke Print Tasks
        run: zig build run -- --print-tasks

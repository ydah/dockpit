name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Release artifact on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        zig:
          - 0.16.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}

      - name: Test
        run: zig build test

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Package
        run: |
          mkdir -p dist
          artifact="dockpit-${{ runner.os }}-${{ runner.arch }}"
          cp zig-out/bin/dockpit "dist/${artifact}"
          shasum -a 256 "dist/${artifact}" > "dist/${artifact}.sha256"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockpit-${{ runner.os }}-${{ runner.arch }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" dist/* --verify-tag --title "$TAG" --notes "dockpit $TAG"
